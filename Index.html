<!DOCTYPE html> <!--tells browser you are using HTML5 i.e the document we are writing it's type is html-->
<html lang="en"> <!--root of an html document-->
<head> <!--container for metadata i.e head tell about the things which are not display on webpage-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First page</title>
</head>
<body> <!--tell about the things which are displayed on webpage-->
    <h1> Hello world</h1>
    <p>This is a paragraph</p>
    
    
</body>
</html>

<!--html tag is parent of head and body tag-->
<!--Most of the html elements have opening and closing tags with content in between-->
<!--some tags have no content in between , eg-<br> tag-->
<!--we can use inspect element /view page source to edit html-->
